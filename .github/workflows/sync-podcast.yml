name: Sync Podcast Feed from Upstream

# Pulls feed-podcasts.json from zarazhangrui/follow-builders.
# We don't fetch podcasts ourselves because pod2txt API keys are private
# to the upstream author. Tweets and blogs are fetched by generate-feed.yml.
#
# Timing: upstream's Generate Feeds cron is 0 6 * * *. We run at 6:30 UTC
# to pull the updated podcast feed before Daily Digest runs at 7:00 UTC.

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Pull feed-podcasts.json from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/zarazhangrui/follow-builders.git
          git fetch upstream main
          git checkout upstream/main -- feed-podcasts.json
          git diff --cached --quiet && {
            echo "No podcast feed changes from upstream"
            exit 0
          }
          git commit -m "chore: sync podcast feed from upstream [skip ci]"
          git push
