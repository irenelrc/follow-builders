name: Sync Feeds from Upstream

# Pulls feed-x.json and feed-podcasts.json from zarazhangrui/follow-builders.
# We don't fetch these ourselves because:
#   - X API Free tier denies read endpoints (needs Basic tier $100/mo)
#   - pod2txt API key is private to the upstream author
# Blogs are NOT synced here — they're fetched locally by generate-feed.yml.
#
# Timing: upstream's Generate Feeds cron is 0 6 * * *. We run at 6:30 UTC
# to pull updated feeds before Daily Digest runs at 7:00 UTC.

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Pull feed-x.json and feed-podcasts.json from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/zarazhangrui/follow-builders.git
          git fetch upstream main
          git checkout upstream/main -- feed-x.json feed-podcasts.json
          git diff --cached --quiet && {
            echo "No feed changes from upstream"
            exit 0
          }
          git commit -m "chore: sync feeds from upstream [skip ci]"
          git push
