name: Generate Feeds

on:
  schedule:
    # Default: blogs only (tweets/podcasts come from sync-upstream.yml).
    # Runs daily at 6am UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'blogs-only'
        type: choice
        options:
          - blogs-only
          - tweets-only
          - podcasts-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        # Only blogs are fetched locally. Tweets (X_BEARER_TOKEN) and podcasts
        # (POD2TXT_API_KEY) are synced from upstream via sync-upstream.yml.
        # Cron has no inputs.mode → fallback to --blogs-only.
        run: |
          MODE="${{ inputs.mode }}"
          cd scripts && node generate-feed.js --${MODE:-blogs-only}

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
